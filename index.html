<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🗳️ 전자투표</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4f8; font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    input::placeholder { color: #94a3b8; }
    button:focus { outline: none; }
    @keyframes spin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadein  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse   { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .fadein { animation: fadein 0.28s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Firebase 설정 (미리 입력됨) ────────────────────────────────
const DB_URL = "https://voting-9aa78-default-rtdb.asia-southeast1.firebasedatabase.app";

const EMOJIS = ["🧑‍💼","👩‍💼","👨‍💼","🎓","🌟","⭐","🦁","🦅","🌿","🔥","🎯","💎"];

const C = {
  bg:"#f0f4f8", surface:"#ffffff", card:"#ffffff", border:"#d1dbe8",
  accent:"#2563eb", glow:"#3b82f6",
  gold:"#d97706", goldBg:"rgba(217,119,6,0.07)", goldBorder:"rgba(217,119,6,0.3)",
  green:"#16a34a", red:"#dc2626", orange:"#ea580c",
  text:"#1e293b", muted:"#64748b", dim:"#e2e8f0",
};

// ── 무기명 토큰 ─────────────────────────────────────────────────
// 브라우저 localStorage에만 저장되는 랜덤 ID.
// 이름·ID 등 개인정보는 서버에 절대 저장되지 않습니다.
const getToken = () => {
  const KEY = "evote_anon_v3";
  let t = localStorage.getItem(KEY);
  if (!t) {
    t = "a" + Math.random().toString(36).slice(2,12) + Date.now().toString(36).slice(-4);
    localStorage.setItem(KEY, t);
  }
  return t;
};

// ── Firebase REST ──────────────────────────────────────────────
const fb = {
  get:   async (b,p)   => { const r=await fetch(`${b}/${p}.json`); if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); },
  set:   async (b,p,v) => fetch(`${b}/${p}.json`,{method:"PUT",  headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}),
  patch: async (b,p,v) => fetch(`${b}/${p}.json`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}),
  post:  async (b,p,v) => { const r=await fetch(`${b}/${p}.json`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}); return r.json(); },
  del:   async (b,p)   => fetch(`${b}/${p}.json`,{method:"DELETE"}),
};

// ── 선출 규칙 옵션 ─────────────────────────────────────────────
// type: "two_thirds" | "majority" | "plurality" | "custom"
const THRESHOLD_OPTIONS = [
  { value:"two_thirds", label:"2/3 이상 (66.7%)",   pct:66.67, calc:(v,t)=>t>0&&v>0&&v/t>=2/3,       need:(t)=>Math.ceil(t*2/3) },
  { value:"majority",   label:"과반수 초과 (50%+1)", pct:50,    calc:(v,t)=>t>0&&v>0&&v/t>0.5,        need:(t)=>Math.floor(t/2)+1 },
  { value:"half",       label:"1/2 이상 (50%)",      pct:50,    calc:(v,t)=>t>0&&v>0&&v/t>=0.5,       need:(t)=>Math.ceil(t/2) },
  { value:"three_q",   label:"3/4 이상 (75%)",       pct:75,    calc:(v,t)=>t>0&&v>0&&v/t>=0.75,      need:(t)=>Math.ceil(t*3/4) },
  { value:"one_third",  label:"1/3 이상 (33.3%)",    pct:33.33, calc:(v,t)=>t>0&&v>0&&v/t>=1/3,       need:(t)=>Math.ceil(t/3) },
  { value:"plurality",  label:"최다득표 (득표 무관)", pct:0,     calc:(v,t,isTop)=>t>0&&v>0&&isTop,    need:()=>1 },
];
const getOpt = (val) => THRESHOLD_OPTIONS.find(o=>o.value===val) || THRESHOLD_OPTIONS[0];

const meetsThreshold = (v, total, optVal, isTop=false) => {
  const opt = getOpt(optVal);
  return opt.calc(v, total, isTop);
};
const needVotes    = (total, optVal) => getOpt(optVal).need(total);
const thresholdPct = (optVal)        => getOpt(optVal).pct;
const thresholdLabel = (optVal)      => getOpt(optVal).label;

// ── 공용 스타일 ────────────────────────────────────────────────
const inp = { width:"100%", background:"#f8fafc", border:`1px solid ${C.border}`, borderRadius:8, padding:"11px 14px", color:C.text, fontSize:15, outline:"none", boxSizing:"border-box", marginBottom:10, fontFamily:"inherit", boxShadow:"inset 0 1px 3px rgba(0,0,0,0.06)" };
const lbl = { display:"block", color:C.muted, fontSize:11, fontWeight:700, marginBottom:6, letterSpacing:"0.6px", textTransform:"uppercase" };
const sec = { background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:18, marginBottom:14, boxShadow:"0 1px 4px rgba(0,0,0,0.06)" };
const sth = { color:C.text, fontWeight:800, fontSize:15, marginBottom:14, paddingBottom:10, borderBottom:`1px solid ${C.border}` };
const mkBtn = (bg=C.accent, extra={}) => ({ padding:"11px 16px", borderRadius:8, border:"none", background:bg, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit", transition:"opacity 0.15s", ...extra });

// ══════════════════════════════════════════════════════════════
function App() {
  const [phase,      setPhase]      = useState("loading"); // loading | main | error
  const [errMsg,     setErrMsg]     = useState("");
  const [config,     setConfig]     = useState({ title:"전자투표", open:false, round:1 });
  const [candidates, setCandidates] = useState({});
  const [voters,     setVoters]     = useState({});
  const [tab,        setTab]        = useState("vote");
  const [isAdmin,    setIsAdmin]    = useState(false);
  const [modal,      setModal]      = useState(false);
  const [adminPw,    setAdminPw]    = useState("");
  const [selectedIds,setSelectedIds]= useState([]); // 다중 선택
  const [voteMsg,    setVoteMsg]    = useState(null);
  const [vBusy,      setVBusy]      = useState(false);
  const [elTitle,    setElTitle]    = useState("");
  const [ec1,        setEc1]        = useState("1"); // electCount1 input
  const [ec2,        setEc2]        = useState("1"); // electCount2 input
  const [et1,        setEt1]        = useState("two_thirds"); // threshold1 input
  const [et2,        setEt2]        = useState("majority");   // threshold2 input
  const [form,       setForm]       = useState({ name:"", party:"", desc:"", emoji:"🧑‍💼" });

  const token     = useRef(getToken()).current;
  // 라운드 변경 시 선택 초기화
  const prevRound  = useRef(1);
  useEffect(()=>{ if(config.round!==prevRound.current){ setSelectedIds([]); setVoteMsg(null); prevRound.current=config.round; } },[config.round]);
  const base      = DB_URL.replace(/\/+$/, "");
  const timer     = useRef(null);
  const savedPw   = useRef(localStorage.getItem("evote_pw") || "1234");
  const firstLoad = useRef(true);

  // ── 데이터 로드 ────────────────────────────────────────────
  // 편집 인풋(제목·선출인원)은 최초 로드 시에만 동기화
  // → 3초 폴링이 사용자 입력을 덮어쓰는 버그 방지
  const fetchAll = async () => {
    try {
      const data = await fb.get(base, "vote");
      if (data) {
        if (data.config) {
          setConfig(data.config);
          if (firstLoad.current) {
            setElTitle(data.config.title||"");
            setEc1(String(data.config.electCount1 || 1));
            setEc2(String(data.config.electCount2 || 1));
            setEt1(data.config.threshold1 || "two_thirds");
            setEt2(data.config.threshold2 || "majority");
            firstLoad.current = false;
          }
        }
        setCandidates(data.candidates || {});
        setVoters(data.voters || {});
      }
    } catch(_) {}
  };

  // ── 자동 연결 (페이지 열자마자) ────────────────────────────
  useEffect(() => {
    (async () => {
      try {
        const existing = await fb.get(base, "vote/config");
        if (!existing) await fb.set(base, "vote/config", { title:"전자투표", open:false, round:1, electCount1:1, electCount2:1, threshold1:"two_thirds", threshold2:"majority", completed:false });
        await fetchAll();
        setPhase("main");
        timer.current = setInterval(fetchAll, 3000);
      } catch(e) {
        setErrMsg(e.message);
        setPhase("error");
      }
    })();
    return () => { if (timer.current) clearInterval(timer.current); };
  }, []);

  // ── 계산값 ─────────────────────────────────────────────────
  const round        = config.round || 1;
  const rKey         = `r${round}`;
  const voted        = !!(voters[token]?.[rKey]);
  const electCount   = round===1 ? (config.electCount1||1) : (config.electCount2||1);
  const threshOpt    = round===1 ? (config.threshold1||"two_thirds") : (config.threshold2||"majority");
  const totalVotes   = Object.values(candidates).reduce((s,c)=>s+(c.votes||0),0);
  const roundPeople  = Object.values(voters).filter(v=>v?.[rKey]).length;
  const abstainCount = Object.values(voters).filter(v=>v?.[rKey]==="abstain").length;
  const sorted       = Object.entries(candidates).sort(([,a],[,b])=>(b.votes||0)-(a.votes||0));
  // plurality(최다득표)는 득표수 관계없이 상위 N명 선출
  const isPluralityMode = threshOpt === "plurality";
  const electedList  = isPluralityMode
    ? sorted.slice(0, electCount).filter(([,c])=>(c.votes||0)>0)
    : sorted.filter(([,c])=>meetsThreshold(c.votes||0, totalVotes, threshOpt)).slice(0, electCount);
  const electedIds   = new Set(electedList.map(([id])=>id));
  const electionDone = electedList.length >= electCount;
  const nv           = needVotes(totalVotes, threshOpt);
  const tp           = thresholdPct(threshOpt);

  // ── 투표 (다중 선택 / 기권 지원) ──────────────────────────
  const toggleCandidate = (id) => {
    if (!config.open) return;
    setVoteMsg(null);
    setSelectedIds(prev => {
      if (prev.includes(id)) return prev.filter(x=>x!==id); // 토글 해제
      if (prev.length >= electCount) {
        setVoteMsg({err:`최대 ${electCount}명까지 선택할 수 있습니다`});
        return prev;
      }
      return [...prev, id];
    });
  };

  const submitVote = async (abstain=false) => {
    if (!config.open) { setVoteMsg({err:"투표가 진행 중이 아닙니다"}); return; }
    if (voted)        { setVoteMsg({err:"이미 투표하셨습니다"});       return; }
    if (!abstain && selectedIds.length===0) { setVoteMsg({err:"후보자를 선택하거나 기권을 눌러주세요"}); return; }
    setVBusy(true);
    try {
      if (!abstain) {
        // 선택한 후보자 각각 +1표
        for (const id of selectedIds) {
          await fb.patch(base, `vote/candidates/${id}`, { votes:(candidates[id]?.votes||0)+1 });
        }
      }
      // 투표 기록 (무기명: 누구에게 투표했는지 저장 안 함)
      await fb.patch(base, `vote/voters/${token}`, { [rKey]: abstain ? "abstain" : true });
      setVoteMsg({ ok: abstain ? null : selectedIds.length, abstain });
      await fetchAll();
    } catch(e) { setVoteMsg({err:"오류: "+e.message}); }
    finally { setVBusy(false); }
  };

  // ── 관리자 ─────────────────────────────────────────────────
  const saveTitle = async () => {
    const t = elTitle.trim() || "전자투표";
    setElTitle(t);
    await fb.patch(base,"vote/config",{title:t});
    setConfig(p=>({...p,title:t}));
  };
  const saveElectCount = async () => {
    const n1 = Math.max(1, parseInt(ec1)||1);
    const n2 = Math.max(1, parseInt(ec2)||1);
    setEc1(String(n1));
    setEc2(String(n2));
    await fb.patch(base,"vote/config",{electCount1:n1, electCount2:n2, threshold1:et1, threshold2:et2});
    setConfig(p=>({...p, electCount1:n1, electCount2:n2, threshold1:et1, threshold2:et2}));
  };
  const toggleOpen  = async () => {
    const n = !config.open;
    // 종료할 때(open: true→false) completed:true 설정
    const extra = (!n && config.open) ? { completed: true } : {};
    await fb.patch(base,"vote/config",{ open:n, ...extra });
    setConfig(p=>({...p, open:n, ...extra}));
  };

  const advanceRunoff = async () => {
    const remaining = electCount - electedList.length;
    if (!confirm(`결선 투표로 진행합니까?\n\n1차 결과가 저장되고, 참여자는 결선에서 다시 투표할 수 있습니다.\n결선 선출 인원: ${config.electCount2||1}명`)) return;
    for (const [id,c] of Object.entries(candidates))
      await fb.patch(base,`vote/candidates/${id}`,{ votes_r1:c.votes||0, votes:0 });
    await fb.patch(base,"vote/config",{ round:2, open:false, completed:false });
    await fetchAll();
  };

  const resetAll = async () => {
    if (!confirm("모든 투표 데이터를 초기화합니까?\n이 작업은 되돌릴 수 없습니다.")) return;
    for (const id of Object.keys(candidates))
      await fb.patch(base,`vote/candidates/${id}`,{ votes:0, votes_r1:0 });
    await fb.del(base,"vote/voters");
    await fb.patch(base,"vote/config",{ round:1, open:false, completed:false, threshold1:et1||"two_thirds", threshold2:et2||"majority" });
    await fetchAll();
  };

  const addCand = async () => {
    if (!form.name.trim()) return;
    await fb.post(base,"vote/candidates",{...form,votes:0});
    setForm({name:"",party:"",desc:"",emoji:"🧑‍💼"});
    await fetchAll();
  };

  const delCand = async (id) => {
    if (!confirm("이 후보자를 삭제합니까?")) return;
    await fb.del(base,`vote/candidates/${id}`);
    await fetchAll();
  };

  const adminLogin = () => {
    if (adminPw===savedPw.current) { setIsAdmin(true); setTab("admin"); setModal(false); setAdminPw(""); }
    else alert("비밀번호가 틀렸습니다");
  };

  // ══════════════════════════════════════════════════════════
  // 로딩
  if (phase==="loading") return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#f0f4f8",color:C.text,gap:16}}>
      <div style={{fontSize:56,animation:"spin 1.8s linear infinite"}}>🗳️</div>
      <div style={{color:"#64748b",fontSize:15,fontWeight:600}}>연결 중...</div>
    </div>
  );

  // 오류
  if (phase==="error") return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#f0f4f8",color:C.text,padding:28,gap:14}}>
      <div style={{fontSize:52}}>⚠️</div>
      <h2 style={{fontWeight:800}}>연결 실패</h2>
      <p style={{color:C.muted,fontSize:14,textAlign:"center",lineHeight:1.9}}>
        Firebase에 연결할 수 없습니다.<br/>
        데이터베이스 보안 규칙이 <code style={{background:"#0a1826",padding:"2px 7px",borderRadius:4}}>read/write: true</code> 인지 확인하세요.
      </p>
      <div style={{background:"#f1f5f9",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 18px",fontFamily:"monospace",fontSize:12,color:"#1e40af",maxWidth:380,wordBreak:"break-all"}}>{errMsg}</div>
      <button style={{...mkBtn(C.accent),fontSize:15,padding:"13px 32px"}} onClick={()=>window.location.reload()}>다시 시도</button>
    </div>
  );

  // ══════════════════════════════════════════════════════════
  // 메인 앱
  return (
    <div style={{background:"#f0f4f8",minHeight:"100vh",color:C.text}}>

      {/* ── 헤더 ── */}
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",borderBottom:`1px solid ${C.border}`,background:"#ffffff",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 8px rgba(0,0,0,0.08)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🗳️</span>
          <div>
            <div style={{fontSize:16,fontWeight:800,letterSpacing:"-0.3px",color:"#1e293b"}}>{config.title||"전자투표"}</div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.3px",color:round===1?"#64748b":"#ea580c"}}>
              {round===1?"1차 투표":"🔥 결선 투표"}
            </div>
          </div>
        </div>
        <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 12px",borderRadius:99,fontSize:12,fontWeight:700,background:config.open?"rgba(34,197,94,0.1)":config.completed?"rgba(124,58,237,0.08)":"rgba(100,116,139,0.1)",color:config.open?C.green:config.completed?"#7c3aed":C.muted,border:`1px solid ${config.open?"rgba(34,197,94,0.25)":config.completed?"rgba(124,58,237,0.2)":"rgba(100,116,139,0.2)"}`}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"currentColor",display:"inline-block",animation:config.open?"pulse 2s infinite":undefined}}/>
          {config.open?"진행중":config.completed?"종료됨":"대기중"}
        </span>
      </header>

      {/* ── 탭 ── */}
      <div style={{display:"flex",background:"#ffffff",borderBottom:`1px solid ${C.border}`,boxShadow:"0 1px 3px rgba(0,0,0,0.06)"}}>
        {[
            {id:"vote",   icon:"🗳", label:"투표하기"},
            // 결과 탭: 투표 종료(completed) 후 모두 공개 / 그 외엔 관리자만
            ...(config.completed || isAdmin ? [{id:"results", icon:"📊", label:"실시간 결과"}] : []),
            ...(isAdmin ? [{id:"admin", icon:"⚙️", label:"관리자"}] : []),
          ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 6px",border:"none",cursor:"pointer",fontFamily:"inherit",background:tab===t.id?"rgba(29,111,164,0.1)":"transparent",color:tab===t.id?C.glow:C.muted,fontSize:13,fontWeight:700,borderBottom:tab===t.id?`2px solid ${C.glow}`:"2px solid transparent",transition:"all 0.15s",whiteSpace:"nowrap"}}>
            {t.icon} {t.label}
          </button>
        ))}
        <button onClick={()=>isAdmin?(setIsAdmin(false),setTab("vote")):setModal(true)} style={{padding:"12px 14px",border:"none",background:"transparent",color:isAdmin?C.red:C.muted,fontSize:isAdmin?12:16,fontWeight:700,cursor:"pointer",borderBottom:"2px solid transparent",marginLeft:"auto",fontFamily:"inherit"}}>
          {isAdmin?"로그아웃":"🔒"}
        </button>
      </div>

      {/* ── 관리자 로그인 모달 ── */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={()=>setModal(false)}>
          <div className="fadein" style={{background:"#ffffff",border:`1px solid ${C.border}`,borderRadius:14,padding:28,maxWidth:300,width:"100%",boxShadow:"0 20px 60px rgba(0,0,0,0.15)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:34,textAlign:"center",marginBottom:10}}>🔐</div>
            <h3 style={{color:C.text,marginBottom:16,fontWeight:800,textAlign:"center"}}>관리자 로그인</h3>
            <input style={inp} type="password" placeholder="비밀번호 (기본: 1234)" value={adminPw} autoFocus onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adminLogin()}/>
            <button style={{...mkBtn(),width:"100%",padding:13,fontSize:15,fontWeight:800,background:"linear-gradient(135deg,#1a6fa8,#0e4d78)",boxShadow:"0 4px 16px rgba(29,111,164,0.3)"}} onClick={adminLogin}>확인</button>
          </div>
        </div>
      )}

      <main style={{padding:"18px 16px",maxWidth:640,margin:"0 auto"}}>

        {/* ════════════════════════════════════════════════ */}
        {/* 투표 탭                                         */}
        {/* ════════════════════════════════════════════════ */}
        {tab==="vote"&&(
          <div className="fadein">

                    <button style={{width:36,height:36,borderRadius:7,border:"1px solid #fed7aa",background:"#fff",color:C.text,fontSize:20,cursor:"pointer",fontWeight:700,flexShrink:0}} onClick={()=>setEc2(p=>String(Math.max(1,(parseInt(p)||1)-1)))}>−</button>
                    <input style={{...inp,marginBottom:0,textAlign:"center",fontSize:18,fontWeight:900,flex:1,padding:"7px"}} type="number" min="1" value={ec2} onChange={e=>setEc2(e.target.value)}/>
                    <button style={{width:36,height:36,borderRadius:7,border:"1px solid #fed7aa",background:"#fff",color:C.text,fontSize:20,cursor:"pointer",fontWeight:700,flexShrink:0}} onClick={()=>setEc2(p=>String((parseInt(p)||1)+1))}>＋</button>
                    <span style={{color:C.muted,fontSize:13}}>명</span>
                  </div>
                </div>
                <div>
                  <label style={lbl}>선출 기준</label>
                  <select value={et2} onChange={e=>setEt2(e.target.value)}
                    style={{width:"100%",background:"#fff",border:"1px solid #fed7aa",borderRadius:8,padding:"10px 12px",color:C.text,fontSize:14,fontWeight:600,outline:"none",cursor:"pointer",fontFamily:"inherit"}}>
                    {THRESHOLD_OPTIONS.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
                  </select>
                </div>
              </div>

              <button style={mkBtn(C.accent,{width:"100%",padding:"13px",fontSize:15,fontWeight:800})} onClick={saveElectCount}>
                💾 설정 저장
              </button>
              <div style={{marginTop:10,color:C.muted,fontSize:12,lineHeight:1.9,padding:"10px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8}}>
                💡 현재 적용<br/>
                · 1차: <strong style={{color:C.text}}>{config.electCount1||1}명</strong> / {thresholdLabel(config.threshold1||"two_thirds")}<br/>
                · 결선: <strong style={{color:C.text}}>{config.electCount2||1}명</strong> / {thresholdLabel(config.threshold2||"majority")}
              </div>
            </div>

            {/* 후보자 추가 */}
            <div style={sec}>
              <h3 style={sth}>➕ 후보자 추가</h3>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {EMOJIS.map(e=>(
                  <button key={e} onClick={()=>setForm(p=>({...p,emoji:e}))} style={{background:form.emoji===e?"rgba(37,99,235,0.12)":"#f1f5f9",border:form.emoji===e?`2px solid ${C.glow}`:"1px solid #e2e8f0",borderRadius:8,padding:"6px 8px",fontSize:18,cursor:"pointer"}}>
                    {e}
                  </button>
                ))}
              </div>
              <input style={inp} placeholder="이름 *"            value={form.name}  onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
              <input style={inp} placeholder="정당 / 소속 (선택)" value={form.party} onChange={e=>setForm(p=>({...p,party:e.target.value}))}/>
              <input style={inp} placeholder="소개 한 줄 (선택)" value={form.desc}  onChange={e=>setForm(p=>({...p,desc:e.target.value}))}/>
              <button style={mkBtn(C.accent,{width:"100%",padding:"12px",opacity:form.name.trim()?1:0.4})} onClick={addCand} disabled={!form.name.trim()}>
                후보자 추가하기
              </button>
            </div>

            {/* 후보자 목록 */}
            <div style={sec}>
              <h3 style={sth}>👥 후보자 목록 <span style={{color:C.muted,fontWeight:400}}>{Object.keys(candidates).length}명</span></h3>
              {Object.entries(candidates).map(([id,c])=>(
                <div key={id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #f1f5f9"}}>
                  <span style={{fontSize:22}}>{c.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{color:C.text,fontWeight:700}}>{c.name}</div>
                    <div style={{color:C.muted,fontSize:12}}>
                      {c.party&&`${c.party} · `}
                      {round===2?`결선 ${c.votes||0}표 / 1차 ${c.votes_r1||0}표`:`${c.votes||0}표`}
                    </div>
                  </div>
                  <button onClick={()=>delCand(id)} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#fee2e2",color:"#dc2626",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>삭제</button>
                </div>
              ))}
              {Object.keys(candidates).length===0&&<div style={{color:C.muted,fontSize:14}}>등록된 후보자가 없습니다</div>}
            </div>

            {/* 무기명 통계 */}
            <div style={sec}>
              <h3 style={sth}>🔒 투표 현황 (무기명)</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:12}}>
                {[{n:roundPeople,l:`${round===1?"1차":"결선"} 참여자`},{n:totalVotes,l:"총 득표수"},{n:abstainCount,l:"기권"}].map((s,i)=>(
                  <div key={i} style={{background:"#f8fafc",border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 12px",textAlign:"center"}}>
                    <div style={{fontSize:26,fontWeight:900,color:C.glow}}>{s.n}</div>
                    <div style={{color:C.muted,fontSize:11,marginTop:3}}>{s.l}</div>
                  </div>
                ))}
              </div>
              <div style={{padding:"10px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8,fontSize:12,color:C.muted,lineHeight:1.8}}>
                🔒 이 시스템은 완전 무기명 투표입니다.<br/>
                투표자의 이름·ID 등 개인정보는 어디에도 저장되지 않습니다.
              </div>
            </div>

          </div>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
