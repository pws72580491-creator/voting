<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🗳️ 전자투표</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080f1a; font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1b2a; }
    ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 3px; }
    input::placeholder { color: #3a5a7a; }
    button:focus { outline: none; }
    @keyframes spin    { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadein  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse   { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .fadein { animation: fadein 0.28s ease; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Firebase 설정 (미리 입력됨) ────────────────────────────────
const DB_URL = "https://voting-9aa78-default-rtdb.asia-southeast1.firebasedatabase.app";

const EMOJIS = ["🧑‍💼","👩‍💼","👨‍💼","🎓","🌟","⭐","🦁","🦅","🌿","🔥","🎯","💎"];

const C = {
  bg:"#080f1a", surface:"#0d1b2a", card:"#112033", border:"#1e3a5f",
  accent:"#1d6fa4", glow:"#3b9ed4",
  gold:"#f5c518", goldBg:"rgba(245,197,24,0.07)", goldBorder:"rgba(245,197,24,0.25)",
  green:"#22c55e", red:"#ef4444", orange:"#f97316",
  text:"#e2eaf3", muted:"#6b8aaa", dim:"#1a3050",
};

// ── 무기명 토큰 ─────────────────────────────────────────────────
// 브라우저 localStorage에만 저장되는 랜덤 ID.
// 이름·ID 등 개인정보는 서버에 절대 저장되지 않습니다.
const getToken = () => {
  const KEY = "evote_anon_v3";
  let t = localStorage.getItem(KEY);
  if (!t) {
    t = "a" + Math.random().toString(36).slice(2,12) + Date.now().toString(36).slice(-4);
    localStorage.setItem(KEY, t);
  }
  return t;
};

// ── Firebase REST ──────────────────────────────────────────────
const fb = {
  get:   async (b,p)   => { const r=await fetch(`${b}/${p}.json`); if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); },
  set:   async (b,p,v) => fetch(`${b}/${p}.json`,{method:"PUT",  headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}),
  patch: async (b,p,v) => fetch(`${b}/${p}.json`,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}),
  post:  async (b,p,v) => { const r=await fetch(`${b}/${p}.json`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(v)}); return r.json(); },
  del:   async (b,p)   => fetch(`${b}/${p}.json`,{method:"DELETE"}),
};

// ── 선출 규칙 ──────────────────────────────────────────────────
// round 1: 전체 투표의 2/3 이상 (≥66.67%)
// round 2: 과반수 초과         (>50%)
const meetsThreshold  = (v, total, round) => total>0 && v>0 && (round===1 ? v/total >= 2/3 : v/total > 0.5);
const needVotes       = (total, round)    => round===1 ? Math.ceil(total*2/3) : Math.floor(total/2)+1;
const thresholdPct    = round             => round===1 ? 66.67 : 50;
const thresholdLabel  = round             => round===1 ? "2/3 이상 (66.7%)" : "과반수 초과 (50%)";

// ── 공용 스타일 ────────────────────────────────────────────────
const inp = { width:"100%", background:"#050d18", border:`1px solid ${C.border}`, borderRadius:8, padding:"11px 14px", color:C.text, fontSize:15, outline:"none", boxSizing:"border-box", marginBottom:10, fontFamily:"inherit" };
const lbl = { display:"block", color:C.muted, fontSize:11, fontWeight:700, marginBottom:6, letterSpacing:"0.6px", textTransform:"uppercase" };
const sec = { background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:18, marginBottom:14 };
const sth = { color:C.text, fontWeight:800, fontSize:15, marginBottom:14, paddingBottom:10, borderBottom:`1px solid ${C.border}` };
const mkBtn = (bg=C.accent, extra={}) => ({ padding:"11px 16px", borderRadius:8, border:"none", background:bg, color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit", transition:"opacity 0.15s", ...extra });

// ══════════════════════════════════════════════════════════════
function App() {
  const [phase,      setPhase]      = useState("loading"); // loading | main | error
  const [errMsg,     setErrMsg]     = useState("");
  const [config,     setConfig]     = useState({ title:"전자투표", open:false, round:1 });
  const [candidates, setCandidates] = useState({});
  const [voters,     setVoters]     = useState({});
  const [tab,        setTab]        = useState("vote");
  const [isAdmin,    setIsAdmin]    = useState(false);
  const [modal,      setModal]      = useState(false);
  const [adminPw,    setAdminPw]    = useState("");
  const [selectedId, setSelectedId] = useState("");
  const [voteMsg,    setVoteMsg]    = useState(null);
  const [vBusy,      setVBusy]      = useState(false);
  const [elTitle,    setElTitle]    = useState("");
  const [ec1,        setEc1]        = useState("1"); // electCount1 input
  const [ec2,        setEc2]        = useState("1"); // electCount2 input
  const [form,       setForm]       = useState({ name:"", party:"", desc:"", emoji:"🧑‍💼" });

  const token  = useRef(getToken()).current;
  const base   = DB_URL.replace(/\/+$/, "");
  const timer  = useRef(null);
  const savedPw= useRef(localStorage.getItem("evote_pw") || "1234");

  // ── 데이터 로드 ────────────────────────────────────────────
  const fetchAll = async () => {
    try {
      const data = await fb.get(base, "vote");
      if (data) {
        if (data.config) {
          setConfig(data.config);
          setElTitle(data.config.title||"");
          setEc1(String(data.config.electCount1 || 1));
          setEc2(String(data.config.electCount2 || 1));
        }
        setCandidates(data.candidates || {});
        setVoters(data.voters || {});
      }
    } catch(_) {}
  };

  // ── 자동 연결 (페이지 열자마자) ────────────────────────────
  useEffect(() => {
    (async () => {
      try {
        const existing = await fb.get(base, "vote/config");
        if (!existing) await fb.set(base, "vote/config", { title:"전자투표", open:false, round:1, electCount1:1, electCount2:1 });
        await fetchAll();
        setPhase("main");
        timer.current = setInterval(fetchAll, 3000);
      } catch(e) {
        setErrMsg(e.message);
        setPhase("error");
      }
    })();
    return () => { if (timer.current) clearInterval(timer.current); };
  }, []);

  // ── 계산값 ─────────────────────────────────────────────────
  const round        = config.round || 1;
  const rKey         = `r${round}`;
  const voted        = !!(voters[token]?.[rKey]);
  const electCount   = round===1 ? (config.electCount1||1) : (config.electCount2||1);
  const totalVotes   = Object.values(candidates).reduce((s,c)=>s+(c.votes||0),0);
  const roundPeople  = Object.values(voters).filter(v=>v?.[rKey]).length;
  const sorted       = Object.entries(candidates).sort(([,a],[,b])=>(b.votes||0)-(a.votes||0));
  // 기준 충족 후보 중 상위 electCount명이 선출됨
  const electedList  = sorted.filter(([,c])=>meetsThreshold(c.votes||0, totalVotes, round)).slice(0, electCount);
  const electedIds   = new Set(electedList.map(([id])=>id));
  const electionDone = electedList.length >= electCount;
  const nv           = needVotes(totalVotes, round);
  const tp           = thresholdPct(round);

  // ── 투표 ───────────────────────────────────────────────────
  const submitVote = async () => {
    if (!selectedId)  { setVoteMsg({err:"후보자를 선택하세요"});      return; }
    if (!config.open) { setVoteMsg({err:"투표가 진행 중이 아닙니다"}); return; }
    if (voted)        { setVoteMsg({err:"이미 투표하셨습니다"});       return; }
    setVBusy(true);
    try {
      await fb.patch(base, `vote/candidates/${selectedId}`, { votes:(candidates[selectedId]?.votes||0)+1 });
      await fb.patch(base, `vote/voters/${token}`, { [rKey]:true });
      setVoteMsg({ ok: candidates[selectedId]?.name });
      await fetchAll();
    } catch(e) { setVoteMsg({err:"오류: "+e.message}); }
    finally { setVBusy(false); }
  };

  // ── 관리자 ─────────────────────────────────────────────────
  const saveTitle   = async () => { await fb.patch(base,"vote/config",{title:elTitle}); setConfig(p=>({...p,title:elTitle})); };
  const saveElectCount = async () => {
    const n1 = Math.max(1, parseInt(ec1)||1);
    const n2 = Math.max(1, parseInt(ec2)||1);
    await fb.patch(base,"vote/config",{electCount1:n1, electCount2:n2});
    setConfig(p=>({...p,electCount1:n1,electCount2:n2}));
  };
  const toggleOpen  = async () => { const n=!config.open; await fb.patch(base,"vote/config",{open:n}); setConfig(p=>({...p,open:n})); };

  const advanceRunoff = async () => {
    const remaining = electCount - electedList.length;
    if (!confirm(`결선 투표로 진행합니까?\n\n1차 결과가 저장되고, 참여자는 결선에서 다시 투표할 수 있습니다.\n결선 선출 인원: ${config.electCount2||1}명`)) return;
    for (const [id,c] of Object.entries(candidates))
      await fb.patch(base,`vote/candidates/${id}`,{ votes_r1:c.votes||0, votes:0 });
    await fb.patch(base,"vote/config",{ round:2, open:false });
    await fetchAll();
  };

  const resetAll = async () => {
    if (!confirm("모든 투표 데이터를 초기화합니까?\n이 작업은 되돌릴 수 없습니다.")) return;
    for (const id of Object.keys(candidates))
      await fb.patch(base,`vote/candidates/${id}`,{ votes:0, votes_r1:0 });
    await fb.del(base,"vote/voters");
    await fb.patch(base,"vote/config",{ round:1, open:false });
    await fetchAll();
  };

  const addCand = async () => {
    if (!form.name.trim()) return;
    await fb.post(base,"vote/candidates",{...form,votes:0});
    setForm({name:"",party:"",desc:"",emoji:"🧑‍💼"});
    await fetchAll();
  };

  const delCand = async (id) => {
    if (!confirm("이 후보자를 삭제합니까?")) return;
    await fb.del(base,`vote/candidates/${id}`);
    await fetchAll();
  };

  const adminLogin = () => {
    if (adminPw===savedPw.current) { setIsAdmin(true); setTab("admin"); setModal(false); setAdminPw(""); }
    else alert("비밀번호가 틀렸습니다");
  };

  // ══════════════════════════════════════════════════════════
  // 로딩
  if (phase==="loading") return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:C.bg,color:C.text,gap:16}}>
      <div style={{fontSize:56,animation:"spin 1.8s linear infinite"}}>🗳️</div>
      <div style={{color:C.muted,fontSize:15,fontWeight:600}}>연결 중...</div>
    </div>
  );

  // 오류
  if (phase==="error") return (
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:C.bg,color:C.text,padding:28,gap:14}}>
      <div style={{fontSize:52}}>⚠️</div>
      <h2 style={{fontWeight:800}}>연결 실패</h2>
      <p style={{color:C.muted,fontSize:14,textAlign:"center",lineHeight:1.9}}>
        Firebase에 연결할 수 없습니다.<br/>
        데이터베이스 보안 규칙이 <code style={{background:"#0a1826",padding:"2px 7px",borderRadius:4}}>read/write: true</code> 인지 확인하세요.
      </p>
      <div style={{background:"#040d17",border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 18px",fontFamily:"monospace",fontSize:12,color:"#7dd3fc",maxWidth:380,wordBreak:"break-all"}}>{errMsg}</div>
      <button style={{...mkBtn(C.accent),fontSize:15,padding:"13px 32px"}} onClick={()=>window.location.reload()}>다시 시도</button>
    </div>
  );

  // ══════════════════════════════════════════════════════════
  // 메인 앱
  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>

      {/* ── 헤더 ── */}
      <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",borderBottom:`1px solid ${C.border}`,background:"linear-gradient(90deg,#0c1e32,#080f1a)",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:22}}>🗳️</span>
          <div>
            <div style={{fontSize:16,fontWeight:800,letterSpacing:"-0.3px"}}>{config.title||"전자투표"}</div>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.3px",color:round===1?C.muted:"#fb923c"}}>
              {round===1?"1차 투표":"🔥 결선 투표"}
            </div>
          </div>
        </div>
        <span style={{display:"inline-flex",alignItems:"center",gap:5,padding:"4px 12px",borderRadius:99,fontSize:12,fontWeight:700,background:config.open?"rgba(34,197,94,0.1)":"rgba(239,68,68,0.1)",color:config.open?C.green:C.red,border:`1px solid ${config.open?"rgba(34,197,94,0.25)":"rgba(239,68,68,0.25)"}`}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:"currentColor",display:"inline-block",animation:config.open?"pulse 2s infinite":undefined}}/>
          {config.open?"진행중":"대기중"}
        </span>
      </header>

      {/* ── 탭 ── */}
      <div style={{display:"flex",background:C.surface,borderBottom:`1px solid ${C.border}`}}>
        {[{id:"vote",icon:"🗳",label:"투표하기"},{id:"results",icon:"📊",label:"실시간 결과"},...(isAdmin?[{id:"admin",icon:"⚙️",label:"관리자"}]:[])].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"12px 6px",border:"none",cursor:"pointer",fontFamily:"inherit",background:tab===t.id?"rgba(29,111,164,0.1)":"transparent",color:tab===t.id?C.glow:C.muted,fontSize:13,fontWeight:700,borderBottom:tab===t.id?`2px solid ${C.glow}`:"2px solid transparent",transition:"all 0.15s",whiteSpace:"nowrap"}}>
            {t.icon} {t.label}
          </button>
        ))}
        <button onClick={()=>isAdmin?(setIsAdmin(false),setTab("vote")):setModal(true)} style={{padding:"12px 14px",border:"none",background:"transparent",color:isAdmin?C.red:C.muted,fontSize:isAdmin?12:16,fontWeight:700,cursor:"pointer",borderBottom:"2px solid transparent",marginLeft:"auto",fontFamily:"inherit"}}>
          {isAdmin?"로그아웃":"🔒"}
        </button>
      </div>

      {/* ── 관리자 로그인 모달 ── */}
      {modal&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.82)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}} onClick={()=>setModal(false)}>
          <div className="fadein" style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:28,maxWidth:300,width:"100%"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:34,textAlign:"center",marginBottom:10}}>🔐</div>
            <h3 style={{color:C.text,marginBottom:16,fontWeight:800,textAlign:"center"}}>관리자 로그인</h3>
            <input style={inp} type="password" placeholder="비밀번호 (기본: 1234)" value={adminPw} autoFocus onChange={e=>setAdminPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&adminLogin()}/>
            <button style={{...mkBtn(),width:"100%",padding:13,fontSize:15,fontWeight:800,background:"linear-gradient(135deg,#1a6fa8,#0e4d78)",boxShadow:"0 4px 16px rgba(29,111,164,0.3)"}} onClick={adminLogin}>확인</button>
          </div>
        </div>
      )}

      <main style={{padding:"18px 16px",maxWidth:640,margin:"0 auto"}}>

        {/* ════════════════════════════════════════════════ */}
        {/* 투표 탭                                         */}
        {/* ════════════════════════════════════════════════ */}
        {tab==="vote"&&(
          <div className="fadein">

            {/* 차수 / 기준 안내 */}
            <div style={{background:round===1?"rgba(29,111,164,0.07)":"rgba(249,115,22,0.07)",border:`1px solid ${round===1?"rgba(29,111,164,0.18)":"rgba(249,115,22,0.18)"}`,borderRadius:10,padding:"11px 16px",marginBottom:14,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6}}>
              <span style={{color:round===1?C.glow:"#fb923c",fontWeight:800,fontSize:14}}>{round===1?"📋 1차 투표":"🔥 결선 투표"}</span>
              <span style={{color:C.muted,fontSize:12}}>선출 기준: <strong style={{color:C.text}}>{thresholdLabel(round)}</strong></span>
            </div>

            {!config.open&&!voted&&(
              <div style={{background:"rgba(239,68,68,0.07)",border:"1px solid rgba(239,68,68,0.18)",borderRadius:10,padding:"12px 16px",color:"#fca5a5",fontSize:14,marginBottom:14,textAlign:"center"}}>
                🔴 현재 투표가 진행 중이 아닙니다
              </div>
            )}

            {voted?(
              <div className="fadein" style={{background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:16,padding:"36px 24px",textAlign:"center"}}>
                <div style={{fontSize:52,marginBottom:12}}>✅</div>
                <div style={{fontSize:21,fontWeight:900,color:C.green,marginBottom:6}}>투표 완료!</div>
                <div style={{color:C.muted,fontSize:14,lineHeight:1.9,marginBottom:20}}>
                  {round===1?"1차 투표":"결선 투표"}에 참여하셨습니다.<br/>
                  <span style={{fontSize:12,color:"#4ade80"}}>🔒 무기명으로 처리되었습니다</span>
                </div>
                <button style={mkBtn(C.dim,{color:C.text,padding:"10px 22px"})} onClick={()=>setTab("results")}>
                  📊 결과 보기
                </button>
              </div>
            ):(
              <>
                <label style={{...lbl,marginBottom:10}}>
                  후보자 선택
                  <span style={{color:"#4ade80",fontWeight:600,fontSize:10,textTransform:"none",letterSpacing:0,marginLeft:6}}>🔒 무기명</span>
                </label>

                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:12,marginBottom:12}}>
                  {Object.entries(candidates).map(([id,c])=>(
                    <div key={id} onClick={()=>{if(config.open){setSelectedId(id);setVoteMsg(null);}}}
                      style={{background:selectedId===id?"rgba(29,111,164,0.15)":C.card,border:selectedId===id?`2px solid ${C.glow}`:`1px solid ${C.border}`,borderRadius:14,padding:"18px 14px",textAlign:"center",cursor:config.open?"pointer":"default",position:"relative",boxShadow:selectedId===id?"0 0 0 4px rgba(59,158,212,0.1)":undefined,transition:"all 0.15s",userSelect:"none"}}>
                      {selectedId===id&&(
                        <div style={{position:"absolute",top:8,right:8,background:C.glow,color:"#fff",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900}}>✓</div>
                      )}
                      <div style={{fontSize:42,marginBottom:8}}>{c.emoji||"👤"}</div>
                      <div style={{color:C.text,fontWeight:800,fontSize:15,marginBottom:5}}>{c.name}</div>
                      {c.party&&<div style={{background:C.dim,color:C.muted,fontSize:10,fontWeight:700,padding:"2px 9px",borderRadius:99,display:"inline-block"}}>{c.party}</div>}
                      {c.desc&&<div style={{color:C.muted,fontSize:11,marginTop:7,lineHeight:1.5}}>{c.desc}</div>}
                    </div>
                  ))}
                  {Object.keys(candidates).length===0&&(
                    <div style={{color:C.muted,textAlign:"center",padding:"48px 20px",gridColumn:"1/-1",fontSize:14,lineHeight:2}}>
                      등록된 후보자가 없습니다<br/>
                      <span style={{fontSize:12,opacity:0.6}}>관리자가 후보자를 추가하면 표시됩니다</span>
                    </div>
                  )}
                </div>

                {voteMsg?.err&&(
                  <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:8,padding:"10px 14px",color:"#fca5a5",fontSize:14,marginBottom:8}}>
                    ⚠️ {voteMsg.err}
                  </div>
                )}

                <button onClick={submitVote} disabled={vBusy||!selectedId||!config.open}
                  style={{width:"100%",padding:"16px",borderRadius:12,border:"none",background:"linear-gradient(135deg,#1a6fa8,#0e4d78)",color:"#fff",fontSize:17,fontWeight:900,cursor:(!selectedId||!config.open)?"not-allowed":"pointer",marginTop:8,fontFamily:"inherit",boxShadow:"0 6px 24px rgba(29,111,164,0.28)",opacity:(!selectedId||!config.open||vBusy)?0.28:1,letterSpacing:"0.3px",transition:"opacity 0.15s"}}>
                  {vBusy?"처리 중...":"🔒 무기명으로 투표하기"}
                </button>
                <div style={{textAlign:"center",color:C.muted,fontSize:11,marginTop:8}}>
                  투표자 신원은 어디에도 저장되지 않습니다
                </div>
              </>
            )}
          </div>
        )}

        {/* ════════════════════════════════════════════════ */}
        {/* 결과 탭                                         */}
        {/* ════════════════════════════════════════════════ */}
        {tab==="results"&&(
          <div className="fadein">

            {/* 선출 완료 배너 */}
            {electionDone&&!config.open&&(
              <div style={{background:C.goldBg,border:`1px solid ${C.goldBorder}`,borderRadius:16,padding:"24px 20px",marginBottom:20,boxShadow:"0 0 48px rgba(245,197,24,0.08)"}}>
                <div style={{fontSize:44,marginBottom:8,textAlign:"center"}}>🏆</div>
                <div style={{fontSize:12,color:C.gold,fontWeight:800,letterSpacing:"1px",textTransform:"uppercase",marginBottom:10,textAlign:"center"}}>
                  {round===1?"1차 투표":"결선 투표"} 선출 완료 ({electedList.length}명)
                </div>
                {electedList.map(([id,c],i)=>(
                  <div key={id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"rgba(245,197,24,0.06)",borderRadius:10,marginBottom:i<electedList.length-1?6:0}}>
                    <span style={{fontSize:24}}>{c.emoji||"👤"}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800,color:C.text,fontSize:15}}>{c.name}{c.party&&<span style={{color:C.muted,fontWeight:400,fontSize:12,marginLeft:6}}>{c.party}</span>}</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontWeight:900,color:C.gold,fontSize:16}}>{c.votes}표</div>
                      <div style={{color:C.muted,fontSize:11}}>{totalVotes>0?((c.votes/totalVotes)*100).toFixed(1):0}%</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* 기준 미달 안내 */}
            {!electionDone&&!config.open&&totalVotes>0&&(
              <div style={{background:"rgba(249,115,22,0.07)",border:"1px solid rgba(249,115,22,0.18)",borderRadius:12,padding:"14px 18px",marginBottom:16,textAlign:"center"}}>
                <div style={{color:"#fb923c",fontWeight:800,fontSize:14,marginBottom:4}}>
                  {round===1?"⚠️ 1차 투표 — 선출 기준 미달":"⚠️ 결선 투표 — 선출 기준 미달"}
                </div>
                <div style={{color:C.muted,fontSize:13,lineHeight:1.8}}>
                  선출 기준: {thresholdLabel(round)}<br/>
                  현재 선출: <strong style={{color:C.text}}>{electedList.length}명</strong> / 목표: <strong style={{color:C.text}}>{electCount}명</strong>
                  {totalVotes>0&&<><br/>선출에 필요한 득표: <strong style={{color:C.text}}>{nv}표 이상</strong> (현재 총 {totalVotes}표)</>}
                </div>
                {round===1&&<div style={{color:C.muted,fontSize:12,marginTop:6}}>관리자가 결선 투표를 시작할 수 있습니다.</div>}
              </div>
            )}

            {/* 통계 카드 */}
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {[
                {n:totalVotes,     l:"총 득표수"},
                {n:`${electedList.length} / ${electCount}명`, l:"선출 현황", c:electionDone?C.gold:C.muted},
                {n:round===1?"1차":"결선", l:"현재 차수", c:round===1?C.glow:"#fb923c"},
              ].map((s,i)=>(
                <div key={i} style={{flex:1,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px 8px",textAlign:"center"}}>
                  <div style={{fontSize:i===1?16:22,fontWeight:900,color:s.c||C.glow}}>{s.n}</div>
                  <div style={{color:C.muted,fontSize:10,fontWeight:700,marginTop:3}}>{s.l}</div>
                </div>
              ))}
            </div>

            {/* 황금선 안내 */}
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14,padding:"8px 12px",background:C.goldBg,border:`1px solid ${C.goldBorder}`,borderRadius:8}}>
              <div style={{width:3,height:14,background:C.gold,borderRadius:2,flexShrink:0}}/>
              <span style={{color:C.muted,fontSize:12}}>
                황금선 = 선출 기준: <strong style={{color:C.gold}}>{thresholdLabel(round)}</strong>
                {totalVotes>0&&<> ({nv}표 필요)</>}
              </span>
            </div>

            {/* 결과 목록 */}
            {sorted.map(([id,c],i)=>{
              const pct  = totalVotes>0?(c.votes||0)/totalVotes*100:0;
              const elct = electedIds.has(id);
              const r1total = Object.values(candidates).reduce((s,x)=>s+(x.votes_r1||0),0);
              const rankLabel = elct ? `🏆` : `${i+1}`;
              return (
                <div key={id} style={{background:elct?C.goldBg:C.card,border:`1px solid ${elct?C.goldBorder:C.border}`,borderRadius:12,padding:"14px 16px",marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{fontSize:22,minWidth:32,textAlign:"center"}}>
                      {elct?"🏆":i===0&&totalVotes>0?`①`:`${i+1}`}
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:800,fontSize:15,color:C.text,display:"flex",alignItems:"center",gap:7,marginBottom:9,flexWrap:"wrap"}}>
                        <span>{c.emoji||"👤"}</span>
                        <span>{c.name}</span>
                        {c.party&&<span style={{background:C.dim,color:C.muted,fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:99}}>{c.party}</span>}
                        {elct&&<span style={{background:"rgba(245,197,24,0.12)",color:C.gold,fontSize:11,fontWeight:800,padding:"2px 10px",borderRadius:99,border:`1px solid ${C.goldBorder}`}}>✓ 선출</span>}
                      </div>
                      {/* 득표 바 + 기준선 */}
                      <div style={{position:"relative",height:8,background:C.dim,borderRadius:99,overflow:"visible",marginBottom:2}}>
                        <div style={{height:"100%",borderRadius:99,width:`${Math.min(pct,100)}%`,transition:"width 0.7s cubic-bezier(0.4,0,0.2,1)",background:elct?`linear-gradient(90deg,${C.gold},#e8a612)`:i===0&&!elct?`linear-gradient(90deg,${C.accent},${C.glow})`:`linear-gradient(90deg,#1a3a5a,#253f60)`}}/>
                        {/* 선출 기준선 */}
                        <div style={{position:"absolute",top:-5,left:`${tp}%`,transform:"translateX(-50%)",width:2,height:18,background:C.gold,borderRadius:2,opacity:0.8}}/>
                      </div>
                    </div>
                    <div style={{textAlign:"right",minWidth:58,flexShrink:0}}>
                      <div style={{fontWeight:900,color:elct?C.gold:C.text,fontSize:18}}>{c.votes||0}표</div>
                      <div style={{color:C.muted,fontSize:11}}>{pct.toFixed(1)}%</div>
                    </div>
                  </div>
                  {/* 결선에서 1차 결과 표시 */}
                  {round===2&&c.votes_r1!==undefined&&(
                    <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.dim}`,color:C.muted,fontSize:12}}>
                      1차 득표: {c.votes_r1||0}표
                      {r1total>0&&` (${((c.votes_r1||0)/r1total*100).toFixed(1)}%)`}
                    </div>
                  )}
                </div>
              );
            })}

            {sorted.length===0&&<div style={{color:C.muted,textAlign:"center",padding:48,fontSize:14}}>후보자가 없습니다</div>}
            <div style={{textAlign:"center",color:C.muted,fontSize:11,marginTop:14,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}>
              <span style={{display:"inline-block",animation:"spin 3s linear infinite"}}>⟳</span> 3초마다 자동 갱신
            </div>
          </div>
        )}

        {/* ════════════════════════════════════════════════ */}
        {/* 관리자 탭                                       */}
        {/* ════════════════════════════════════════════════ */}
        {tab==="admin"&&isAdmin&&(
          <div className="fadein">

            {/* 투표 진행 관리 */}
            <div style={sec}>
              <h3 style={sth}>🔄 투표 진행 관리</h3>
              <div style={{background:"#0a1624",borderRadius:10,padding:"12px 14px",marginBottom:14,fontSize:13,lineHeight:2,color:C.muted}}>
                <div>차수: <strong style={{color:C.text}}>{round===1?"1차 투표":"🔥 결선 투표"}</strong></div>
                <div>선출 기준: <strong style={{color:C.gold}}>{thresholdLabel(round)}</strong></div>
                <div>선출 인원: <strong style={{color:C.text}}>{electCount}명</strong> (현재 선출: {electedList.length}명)</div>
                <div>현재 상태: <strong style={{color:config.open?C.green:C.red}}>{config.open?"진행중":"대기중"}</strong></div>
                {totalVotes>0&&<div>선출 필요 득표: <strong style={{color:C.text}}>{nv}표 이상</strong> (총 {totalVotes}표 기준)</div>}
              </div>

              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                <button style={mkBtn(config.open?"#7f1d1d":"#14532d",{flex:1,color:config.open?C.red:C.green,padding:"13px 10px",minWidth:120})} onClick={toggleOpen}>
                  {config.open?"🔴 투표 종료":"🟢 투표 시작"}
                </button>
                {round===1&&!config.open&&(
                  <button style={mkBtn("#7c2d12",{flex:1,color:"#fb923c",padding:"13px 10px",minWidth:120})} onClick={advanceRunoff}>
                    🔥 결선 투표로 진행
                  </button>
                )}

              {!electionDone&&!config.open&&totalVotes>0&&round===1&&(
                <div style={{marginTop:12,padding:"10px 14px",background:"rgba(249,115,22,0.07)",border:"1px solid rgba(249,115,22,0.18)",borderRadius:8,color:"#fb923c",fontSize:13,lineHeight:1.8}}>
                  ⚠️ 1차 목표 {electCount}명 중 {electedList.length}명만 선출되었습니다.<br/>
                  <strong>결선 투표로 진행</strong> 버튼을 눌러 결선을 시작하세요.
                </div>
              )}
              <button style={mkBtn("#3b1c6a",{width:"100%",color:"#c084fc",padding:"12px 10px",marginTop:8})} onClick={resetAll}>
                🔄 전체 초기화 (1차로 되돌리기)
              </button>
            </div>
            </div>

            {/* 선거 제목 */}
            <div style={sec}>
              <h3 style={sth}>⚙️ 선거 제목</h3>
              <div style={{display:"flex",gap:8}}>
                <input style={{...inp,flex:1,marginBottom:0}} value={elTitle} onChange={e=>setElTitle(e.target.value)} placeholder="선거 제목"/>
                <button style={mkBtn()} onClick={saveTitle}>저장</button>
              </div>
            </div>

            {/* 선출 인원 설정 */}
            <div style={sec}>
              <h3 style={sth}>🎯 선출 인원 설정</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                <div>
                  <label style={lbl}>1차 투표 선출 인원</label>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setEc1(p=>String(Math.max(1,parseInt(p)-1)))} style={{...mkBtn(C.dim),padding:"8px 14px",fontSize:18,color:C.text}}>−</button>
                    <input style={{...inp,marginBottom:0,textAlign:"center",fontSize:20,fontWeight:900,flex:1}} type="number" min="1" value={ec1} onChange={e=>setEc1(e.target.value)}/>
                    <button onClick={()=>setEc1(p=>String(parseInt(p)+1))} style={{...mkBtn(C.dim),padding:"8px 14px",fontSize:18,color:C.text}}>＋</button>
                  </div>
                  <div style={{color:C.muted,fontSize:11,marginTop:4,textAlign:"center"}}>기준: 2/3 이상</div>
                </div>
                <div>
                  <label style={lbl}>결선 투표 선출 인원</label>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <button onClick={()=>setEc2(p=>String(Math.max(1,parseInt(p)-1)))} style={{...mkBtn(C.dim),padding:"8px 14px",fontSize:18,color:C.text}}>−</button>
                    <input style={{...inp,marginBottom:0,textAlign:"center",fontSize:20,fontWeight:900,flex:1}} type="number" min="1" value={ec2} onChange={e=>setEc2(e.target.value)}/>
                    <button onClick={()=>setEc2(p=>String(parseInt(p)+1))} style={{...mkBtn(C.dim),padding:"8px 14px",fontSize:18,color:C.text}}>＋</button>
                  </div>
                  <div style={{color:C.muted,fontSize:11,marginTop:4,textAlign:"center"}}>기준: 과반수 초과</div>
                </div>
              </div>
              <button style={mkBtn(C.accent,{width:"100%",padding:"12px"})} onClick={saveElectCount}>
                선출 인원 저장
              </button>
              <div style={{marginTop:10,color:C.muted,fontSize:12,lineHeight:1.7,padding:"8px 12px",background:"#0a1826",borderRadius:8}}>
                💡 현재 설정: 1차 <strong style={{color:C.text}}>{config.electCount1||1}명</strong>, 결선 <strong style={{color:C.text}}>{config.electCount2||1}명</strong>
              </div>
            </div>

            {/* 후보자 추가 */}
            <div style={sec}>
              <h3 style={sth}>➕ 후보자 추가</h3>
              <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                {EMOJIS.map(e=>(
                  <button key={e} onClick={()=>setForm(p=>({...p,emoji:e}))} style={{background:form.emoji===e?"rgba(59,158,212,0.2)":C.dim,border:form.emoji===e?`1px solid ${C.glow}`:"1px solid transparent",borderRadius:8,padding:"6px 8px",fontSize:18,cursor:"pointer"}}>
                    {e}
                  </button>
                ))}
              </div>
              <input style={inp} placeholder="이름 *"            value={form.name}  onChange={e=>setForm(p=>({...p,name:e.target.value}))}/>
              <input style={inp} placeholder="정당 / 소속 (선택)" value={form.party} onChange={e=>setForm(p=>({...p,party:e.target.value}))}/>
              <input style={inp} placeholder="소개 한 줄 (선택)" value={form.desc}  onChange={e=>setForm(p=>({...p,desc:e.target.value}))}/>
              <button style={mkBtn(C.accent,{width:"100%",padding:"12px",opacity:form.name.trim()?1:0.4})} onClick={addCand} disabled={!form.name.trim()}>
                후보자 추가하기
              </button>
            </div>

            {/* 후보자 목록 */}
            <div style={sec}>
              <h3 style={sth}>👥 후보자 목록 <span style={{color:C.muted,fontWeight:400}}>{Object.keys(candidates).length}명</span></h3>
              {Object.entries(candidates).map(([id,c])=>(
                <div key={id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${C.dim}`}}>
                  <span style={{fontSize:22}}>{c.emoji}</span>
                  <div style={{flex:1}}>
                    <div style={{color:C.text,fontWeight:700}}>{c.name}</div>
                    <div style={{color:C.muted,fontSize:12}}>
                      {c.party&&`${c.party} · `}
                      {round===2?`결선 ${c.votes||0}표 / 1차 ${c.votes_r1||0}표`:`${c.votes||0}표`}
                    </div>
                  </div>
                  <button onClick={()=>delCand(id)} style={{padding:"6px 12px",borderRadius:6,border:"none",background:"#3b1414",color:C.red,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>삭제</button>
                </div>
              ))}
              {Object.keys(candidates).length===0&&<div style={{color:C.muted,fontSize:14}}>등록된 후보자가 없습니다</div>}
            </div>

            {/* 무기명 통계 */}
            <div style={sec}>
              <h3 style={sth}>🔒 투표 현황 (무기명)</h3>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                {[{n:roundPeople,l:`${round===1?"1차":"결선"} 참여자`},{n:totalVotes,l:"총 득표수"}].map((s,i)=>(
                  <div key={i} style={{background:"#0a1826",border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 12px",textAlign:"center"}}>
                    <div style={{fontSize:26,fontWeight:900,color:C.glow}}>{s.n}</div>
                    <div style={{color:C.muted,fontSize:11,marginTop:3}}>{s.l}</div>
                  </div>
                ))}
              </div>
              <div style={{padding:"10px 14px",background:"#0a1826",borderRadius:8,fontSize:12,color:C.muted,lineHeight:1.8}}>
                🔒 이 시스템은 완전 무기명 투표입니다.<br/>
                투표자의 이름·ID 등 개인정보는 어디에도 저장되지 않습니다.
              </div>
            </div>

          </div>
        )}

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
